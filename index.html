<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paseos Esposita 🐾</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root {
  --primary: #0F4C81;
  --primary-light: #e6eef7;
  --primary-mid: #c7d9ee;
  --blue-dark: #0b3a63;
  --mint: #6ee7b7;
  --mint-light: #d1fae5;
  --yellow: #fbbf24;
  --yellow-light: #fef3c7;
  --purple: #a78bfa;
  --purple-light: #ede9fe;
  --text: #1e1b4b;
  --muted: #6b7280;
  --card: #ffffff;
  --bg: #f5f9ff;
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 480px;
  margin: auto;
}

/* HEADER */
.app-header {
  background: linear-gradient(135deg, #0F4C81, #3b82f6);
  color: white;
  padding: 18px;
  text-align: center;
}

/* BOTONES */
.btn-primary {
  background: linear-gradient(135deg, #0F4C81, #3b82f6);
  color: white;
}

/* CARDS */
.card {
  background: white;
  border-radius: 12px;
  padding: 14px;
  margin: 10px;
}

/* HORARIO */
.horario-grid {
  display: grid;
  grid-template-columns: 50px repeat(6, 1fr);
}

.hor-header {
  background: var(--primary);
  color: white;
  text-align: center;
  padding: 6px;
}

.hor-slot {
  border: 1px solid #eee;
}

.hor-time {
  background: var(--primary-light);
  text-align: center;
}

/* OTROS */
.tab-btn.active {
  color: var(--primary);
  border-bottom: 3px solid var(--primary);
}
</style>
</head>

<body>

<div class="app-header">
  <h1>🐾 Paseos Esposita</h1>
</div>

<!-- CONTENIDO -->
<div id="horario-grid" class="horario-grid"></div>

<script>
const DIAS = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

const HORAS = [
  '9am','10am','11am','12pm',
  '1pm','2pm','3pm','4pm',
  '5pm','6pm','7pm'
];

function renderHorario() {
  const grid = document.getElementById('horario-grid');
  let html = '<div class="hor-header"></div>';

  DIAS.forEach(dia => {
    html += `<div class="hor-header">${dia.slice(0,3)}</div>`;
  });

  HORAS.forEach(hora => {
    html += `<div class="hor-time">${hora}</div>`;
    DIAS.forEach(dia => {
      html += `<div class="hor-slot"><textarea></textarea></div>`;
    });
  });

  grid.innerHTML = html;
}

renderHorario();
</script>

</body>
</html>
